<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Now Playing Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; font-family: 'Segoe UI', sans-serif; width: 420px; overflow: hidden; }

  #status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(10,10,14,0.85); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 12px;
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6);
    transition: opacity 0.4s;
  }
  #status-badge.hidden { opacity: 0; pointer-events: none; }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff4d4d; box-shadow: 0 0 6px #ff4d4d;
    transition: background 0.4s, box-shadow 0.4s;
  }
  #status-dot.connecting { background: #ffcc00; box-shadow: 0 0 6px #ffcc00; animation: blink 1s ease-in-out infinite; }
  #status-dot.connected  { background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #player-card {
    position: relative; width: 420px;
    background: rgba(10, 10, 14, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px 12px 14px; overflow: hidden;
    opacity: 0; transform: translateY(20px); margin-top: 8px;
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  #player-card.visible { opacity: 1; transform: translateY(0); }
  #player-card::before {
    content: ''; position: absolute; left: -30px; top: -30px;
    width: 140px; height: 140px;
    background: var(--accent-glow, rgba(145,70,255,0.22));
    border-radius: 50%; filter: blur(40px); pointer-events: none; z-index: 0;
    transition: background 1s ease;
  }
  #player-card::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    border-radius: 14px; pointer-events: none; z-index: 0;
  }

  /* PAUSE overlay */
  #pause-overlay {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(0,0,0,0.45);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #pause-overlay.visible { opacity: 1; }
  #pause-icon {
    font-size: 36px; color: rgba(255,255,255,0.7);
    filter: drop-shadow(0 0 12px rgba(0,0,0,0.8));
    animation: pausePulse 2s ease-in-out infinite;
  }
  @keyframes pausePulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }

  .inner { position: relative; z-index: 1; }
  .top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .thumb-wrap {
    position: relative; flex-shrink: 0; width: 68px; height: 50px;
    border-radius: 8px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 4px 14px rgba(0,0,0,0.5); background: #111;
  }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.4s; }

  /* Pause effect on thumbnail */
  .thumb-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.3s;
  }
  #player-card.paused .thumb-wrap::after { background: rgba(0,0,0,0.4); }

  .eq-overlay {
    position: absolute; bottom: 4px; right: 4px;
    display: flex; align-items: flex-end; gap: 2px; height: 14px;
    transition: opacity 0.3s;
  }
  /* Freeze EQ bars when paused */
  #player-card.paused .eq-overlay { opacity: 0.2; }
  #player-card.paused .eq-bar { animation-play-state: paused !important; }

  .eq-bar { width: 3px; border-radius: 2px; background: #fff; animation: eq 0.6s ease-in-out infinite alternate; }
  .eq-bar:nth-child(1){animation-duration:0.45s;animation-delay:0.00s}
  .eq-bar:nth-child(2){animation-duration:0.60s;animation-delay:0.10s}
  .eq-bar:nth-child(3){animation-duration:0.50s;animation-delay:0.05s}
  .eq-bar:nth-child(4){animation-duration:0.70s;animation-delay:0.15s}
  .eq-bar:nth-child(5){animation-duration:0.40s;animation-delay:0.08s}
  @keyframes eq{0%{height:2px;opacity:0.5}100%{height:14px;opacity:1}}

  .source-badge {
    position: absolute; top: 4px; left: 4px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 2px 5px; border-radius: 4px; color: #fff; line-height: 1.2; transition: background 0.5s;
  }
  .track-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
  .label-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 6px #00ff88;
    animation: pulse 1.5s ease-in-out infinite; flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  /* Paused state dot becomes yellow */
  #player-card.paused .label-dot {
    background: #ffcc00; box-shadow: 0 0 6px #ffcc00;
    animation: none;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
  .label-text {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: #00ff88; transition: color 0.3s;
  }
  #player-card.paused .label-text { color: #ffcc00; }

  .mode-badge {
    margin-left: auto; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: rgba(255,255,255,0.35); padding: 1px 6px;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
  }
  .title-wrap {
    overflow: hidden; white-space: nowrap;
    mask-image: linear-gradient(to right, black 82%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, black 82%, transparent 100%);
  }
  .song-title { display: inline-block; font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }
  .song-title.scrolling { animation: marquee 14s linear infinite; }
  /* Pause marquee */
  #player-card.paused .song-title.scrolling { animation-play-state: paused; }

  @keyframes marquee{
    0%{transform:translateX(0)}15%{transform:translateX(0)}
    85%{transform:translateX(var(--sd,-80px))}100%{transform:translateX(var(--sd,-80px))}
  }
  .song-author { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-row { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
  .time { font-size: 10px; font-family: 'Courier New', monospace; color: rgba(255,255,255,0.5); flex-shrink: 0; min-width: 32px; }
  .time.end { text-align: right; }
  .bar-wrap { flex: 1; height: 16px; position: relative; display: flex; align-items: center; }
  .wave-bars { display: flex; align-items: center; gap: 2px; height: 16px; width: 100%; overflow: hidden; }
  .w-bar { flex-shrink: 0; width: 3px; border-radius: 1px; background: rgba(255,255,255,0.15); transition: background 0.4s; }
  .w-bar.played { background: var(--accent-bar, #9146ff); }
  .bar-fill-overlay {
    position: absolute; left: 0; top: 50%; height: 4px; transform: translateY(-50%);
    border-radius: 2px; background: var(--accent-bar, #9146ff); opacity: 0.35;
    pointer-events: none; transition: width 1s linear, background 1s ease;
  }
  /* Stop smooth transition when paused */
  #player-card.paused .bar-fill-overlay { transition: width 0s, background 1s ease; }

  .req-row { margin-top: 7px; display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.35); }
  .req-user { color: #bf94ff; font-weight: 600; }

  /* PAUSED label badge */
  #paused-badge {
    display: none;
    position: absolute; top: 10px; right: 14px; z-index: 6;
    background: rgba(255,204,0,0.15); border: 1px solid rgba(255,204,0,0.4);
    color: #ffcc00; font-size: 9px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 10px;
    animation: fadeFlash 2s ease-in-out infinite;
  }
  #player-card.paused #paused-badge { display: block; }
  @keyframes fadeFlash { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>

<div id="status-badge">
  <div id="status-dot" class="connecting"></div>
  <span id="status-text">Підключення...</span>
</div>

<div id="player-card">
  <!-- Pause overlay -->
  <div id="pause-overlay">
    <span id="pause-icon">⏸</span>
  </div>
  <!-- Paused badge -->
  <div id="paused-badge">⏸ PAUSED</div>

  <div class="inner">
    <div class="top-row">
      <div class="thumb-wrap">
        <img id="thumb" src="" alt="">
        <div class="source-badge" id="src-badge"></div>
        <div class="eq-overlay">
          <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
          <div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
      </div>
      <div class="track-info">
        <div class="label-row">
          <div class="label-dot"></div>
          <span class="label-text" id="label-text">Now Playing</span>
          <span class="mode-badge" id="mode-badge"></span>
        </div>
        <div class="title-wrap"><span class="song-title" id="song-title"></span></div>
        <div class="song-author" id="song-author"></div>
      </div>
    </div>
    <div class="progress-row">
      <span class="time" id="time-cur">0:00</span>
      <div class="bar-wrap">
        <div class="wave-bars" id="wave-bars"></div>
        <div class="bar-fill-overlay" id="bar-fill" style="width:0%"></div>
      </div>
      <span class="time end" id="time-total">0:00</span>
    </div>
    <div class="req-row" id="req-row" style="display:none">
      Requested by <span class="req-user" id="req-user"></span>
    </div>
  </div>
</div>

<script>
  let WS_PORT = localStorage.getItem('ytm_ws_port') || '8080';

  const COLORS = {
    request: { glow:'rgba(145,70,255,0.25)', bar:'#9146ff', badge:'rgba(145,70,255,0.85)' },
    manual:  { glow:'rgba(0,136,255,0.25)',  bar:'#0088ff', badge:'rgba(0,136,255,0.85)'  },
    auto:    { glow:'rgba(255,204,0,0.20)',   bar:'#ffcc00', badge:'rgba(180,140,0,0.85)'  },
  };

  const statusBadge = document.getElementById('status-badge');
  const statusDot   = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const card        = document.getElementById('player-card');
  const pauseOverlay = document.getElementById('pause-overlay');
  const labelTextEl = document.getElementById('label-text');
  const thumb       = document.getElementById('thumb');
  const srcBadge    = document.getElementById('src-badge');
  const modeBadge   = document.getElementById('mode-badge');
  const titleEl     = document.getElementById('song-title');
  const authorEl    = document.getElementById('song-author');
  const timeCur     = document.getElementById('time-cur');
  const timeTotal   = document.getElementById('time-total');
  const barFill     = document.getElementById('bar-fill');
  const reqRow      = document.getElementById('req-row');
  const reqUser     = document.getElementById('req-user');
  const waveBarsEl  = document.getElementById('wave-bars');

  // Build wave bars
  for (let i = 0; i < 52; i++) {
    const b = document.createElement('div');
    b.className = 'w-bar';
    b.style.height = (4 + Math.random() * 12) + 'px';
    waveBarsEl.appendChild(b);
  }
  const wBars = [...waveBarsEl.querySelectorAll('.w-bar')];

  function fmt(s) {
    s = Math.max(0, Math.round(s));
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }
  function updateWave(pct) {
    const played = Math.floor(pct * 52);
    wBars.forEach((b, i) => b.classList.toggle('played', i < played));
  }
  function setStatus(state, text) {
    statusDot.className = state;
    statusText.textContent = text;
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let startTs   = null;   // timestamp when song started (or resumed)
  let elapsed   = 0;      // seconds elapsed up to last pause/sync
  let duration  = 0;
  let isPaused  = false;
  let ticker    = null;

  function tick() {
    if (isPaused || !startTs) return;
    const totalElapsed = elapsed + (Date.now() - startTs) / 1000;
    const pct = duration > 0 ? Math.min(1, totalElapsed / duration) : 0;
    timeCur.textContent = fmt(totalElapsed);
    barFill.style.width = (pct * 100).toFixed(1) + '%';
    updateWave(pct);
    // Auto-hide when song finishes (safety net)
    if (duration > 0 && totalElapsed >= duration + 2) hideSong();
  }

  // ── Pause / Resume visual state ────────────────────────────────────────────
  function setPausedState(paused) {
    isPaused = paused;
    if (paused) {
      card.classList.add('paused');
      pauseOverlay.classList.add('visible');
      labelTextEl.textContent = 'Paused';
      // Snapshot elapsed at pause moment
      if (startTs) {
        elapsed += (Date.now() - startTs) / 1000;
        startTs = null;
      }
    } else {
      card.classList.remove('paused');
      pauseOverlay.classList.remove('visible');
      labelTextEl.textContent = 'Now Playing';
      // Resume timer
      startTs = Date.now();
    }
  }

  // ── Show song ──────────────────────────────────────────────────────────────
  function showSong(data) {
    // data.elapsed — seconds already played (for sync on reconnect)
    elapsed  = data.elapsed || 0;
    duration = data.duration || 0;
    isPaused = !!data.paused;

    const type = data.user === 'Auto' ? 'auto' : (data.user === 'Streamer' ? 'manual' : 'request');
    const c = COLORS[type];
    card.style.setProperty('--accent-glow', c.glow);
    card.style.setProperty('--accent-bar',  c.bar);
    srcBadge.style.background = c.badge;
    srcBadge.textContent  = { auto:'Auto', manual:'Manual', request:'!SR' }[type];
    modeBadge.textContent = srcBadge.textContent;

    thumb.style.opacity = 0;
    thumb.src = 'https://i.ytimg.com/vi/' + data.id + '/mqdefault.jpg';
    thumb.onload = () => { thumb.style.opacity = 1; };

    titleEl.classList.remove('scrolling');
    titleEl.style.removeProperty('--sd');
    titleEl.textContent  = data.title  || 'Unknown';
    authorEl.textContent = data.author || '';
    requestAnimationFrame(() => {
      const overflow = titleEl.scrollWidth - titleEl.parentElement.clientWidth;
      if (overflow > 10) {
        titleEl.style.setProperty('--sd', '-' + (overflow + 20) + 'px');
        titleEl.classList.add('scrolling');
      }
    });

    timeTotal.textContent = duration > 0 ? fmt(duration) : '--:--';

    if (type === 'request' && data.user) {
      reqRow.style.display = 'flex';
      reqUser.textContent  = '@' + data.user;
    } else {
      reqRow.style.display = 'none';
    }

    // Set paused/playing visual
    if (isPaused) {
      card.classList.add('paused');
      pauseOverlay.classList.add('visible');
      labelTextEl.textContent = 'Paused';
      startTs = null;
    } else {
      card.classList.remove('paused');
      pauseOverlay.classList.remove('visible');
      labelTextEl.textContent = 'Now Playing';
      startTs = Date.now();
    }

    // Draw initial progress
    const pct = duration > 0 ? Math.min(1, elapsed / duration) : 0;
    barFill.style.transition = 'none';
    barFill.style.width = (pct * 100).toFixed(1) + '%';
    updateWave(pct);
    timeCur.textContent = fmt(elapsed);
    setTimeout(() => { barFill.style.transition = ''; }, 50);

    statusBadge.classList.add('hidden');
    card.classList.add('visible');

    clearInterval(ticker);
    ticker = setInterval(tick, 500);
    tick();
  }

  // ── Sync event (periodic update from index.html) ───────────────────────────
  function syncSong(data) {
    if (!card.classList.contains('visible')) return;
    // Resync elapsed time
    elapsed  = data.elapsed || 0;
    duration = data.duration || duration;
    isPaused = !!data.paused;
    if (!isPaused) {
      startTs = Date.now();
    } else {
      startTs = null;
    }
    tick();
  }

  // ── Hide song ──────────────────────────────────────────────────────────────
  function hideSong() {
    startTs  = null;
    elapsed  = 0;
    isPaused = false;
    clearInterval(ticker);
    card.classList.remove('visible', 'paused');
    pauseOverlay.classList.remove('visible');
    labelTextEl.textContent = 'Now Playing';
    statusBadge.classList.remove('hidden');
    setStatus('connected', 'Підключено · очікування пісні...');
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  let ws = null;
  let wsReconnectTimeout = null;

  function connectWebsocket() {
    setStatus('connecting', 'Підключення до порту ' + WS_PORT + '...');
    ws = new WebSocket('ws://localhost:' + WS_PORT + '/');

    ws.onopen = () => {
      setStatus('connected', 'Підключено · очікування пісні...');
      ws.send(JSON.stringify({ request: 'Subscribe', events: { General: ['Custom'] }, id: 'Sub' }));
    };

    ws.onmessage = (e) => {
      const rawData = e.data.toString();
      if (rawData.includes('"request":"Hello"') || rawData.includes('"id":"Sub"')) return;

      try {
        let inner = null;
        const raw = JSON.parse(rawData);

        if (raw.data && typeof raw.data === 'object' && raw.data.data) {
          inner = JSON.parse(raw.data.data);
        } else if (raw.type) {
          inner = raw;
        }
        if (!inner) return;

        // ── NOW_PLAYING: new song started ──
        if (inner.type === 'NOW_PLAYING' || (!inner.type && inner.id)) {
          if (inner.stopped || !inner.id) {
            hideSong();
          } else {
            showSong(inner);
          }
        }
        // ── NOW_PAUSED ──
        else if (inner.type === 'NOW_PAUSED') {
          if (card.classList.contains('visible')) setPausedState(true);
        }
        // ── NOW_RESUMED ──
        else if (inner.type === 'NOW_RESUMED') {
          if (card.classList.contains('visible')) {
            // Resync elapsed if provided
            if (inner.elapsed !== undefined) elapsed = inner.elapsed;
            setPausedState(false);
          }
        }
        // ── NOW_STOPPED ──
        else if (inner.type === 'NOW_STOPPED') {
          hideSong();
        }
        // ── NOW_SYNC (periodic time update) ──
        else if (inner.type === 'NOW_SYNC') {
          syncSong(inner);
        }

      } catch (err) {}
    };

    ws.onclose = () => {
      setStatus('', 'Відключено. Повтор через 5с...');
      statusBadge.classList.remove('hidden');
      clearInterval(ticker);
      wsReconnectTimeout = setTimeout(connectWebsocket, 5000);
    };
  }

  connectWebsocket();
</script>
</body>
</html>
